<!doctype html>
<html lang="fr">
<head>
    <title>Liste des produits</title>
    <style>
        /* Style simple pour rendre le tableau lisible */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        table {
            border-collapse: collapse;
            width: 60%;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .erreur {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Produits</h1>

    <!-- Si on a un message d'erreur, on l'affiche en rouge -->
    {% if error %}
        <p class="erreur">{{ error }}</p>

    <!-- Sinon on affiche le tableau des produits -->
    {% elif products %}
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Catégorie</th>
                    <th>Prix (€)</th>
                </tr>
            </thead>
            <tbody>
                <!-- On boucle sur chaque produit reçu depuis Flask -->
                {% for product in products %}
                <tr>
                    <td>{{ product.name }}</td>
                    <td>{{ product.category }}</td>
                    <td>{{ product.price }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    {% else %}
        <p>Aucun produit à afficher.</p>
    {% endif %}
</body>
</html>
